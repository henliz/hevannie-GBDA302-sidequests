<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GBDA302 Sidequests – hevannie</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --sidebar-w: 220px;
      --bg: #0f0f13;
      --sidebar-bg: #16161d;
      --accent: #7c6fff;
      --text: #e8e8f0;
      --muted: #888899;
      --border: #2a2a38;
    }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      overflow: hidden;
    }

    /* --- Sidebar --- */
    #sidebar {
      width: var(--sidebar-w);
      min-width: var(--sidebar-w);
      background: var(--sidebar-bg);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow-y: auto;
    }

    .sidebar-header {
      padding: 24px 20px 20px;
      border-bottom: 1px solid var(--border);
    }

    .sidebar-header h1 {
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: 0.04em;
    }

    .sidebar-header p {
      font-size: 0.72rem;
      color: var(--muted);
      margin-top: 3px;
      letter-spacing: 0.03em;
      text-transform: uppercase;
    }

    .sq-list {
      list-style: none;
      padding: 10px 0;
      flex: 1;
    }

    .sq-list li {
      padding: 0 10px;
    }

    .sq-btn {
      width: 100%;
      background: none;
      border: none;
      color: var(--muted);
      text-align: left;
      padding: 9px 12px;
      border-radius: 7px;
      cursor: pointer;
      font-size: 0.875rem;
      transition: background 0.12s, color 0.12s;
      font-family: inherit;
    }

    .sq-btn:hover {
      background: rgba(124, 111, 255, 0.1);
      color: var(--text);
    }

    .sq-btn.active {
      background: rgba(124, 111, 255, 0.18);
      color: var(--accent);
      font-weight: 600;
    }

    /* --- Main --- */
    #main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-width: 0;
    }

    #main-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 28px;
      border-bottom: 1px solid var(--border);
      height: 60px;
      flex-shrink: 0;
    }

    #sq-title {
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--text);
    }

    #readme-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 7px 16px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.82rem;
      font-family: inherit;
      transition: border-color 0.15s, color 0.15s;
    }

    #readme-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    #canvas-area {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      overflow: hidden;
    }

    #sketch-frame {
      /* Keep it square, fitting the available space */
      width: min(calc(100vh - 108px), calc(100vw - var(--sidebar-w) - 48px));
      height: min(calc(100vh - 108px), calc(100vw - var(--sidebar-w) - 48px));
      border: none;
      border-radius: 10px;
      background: #000;
      display: none;
    }

    #landing {
      text-align: center;
      color: var(--muted);
      user-select: none;
    }

    #landing h2 {
      font-size: 1.4rem;
      font-weight: 300;
      margin-bottom: 8px;
      color: var(--text);
      letter-spacing: -0.01em;
    }

    #landing p {
      font-size: 0.88rem;
    }

    /* --- README Modal --- */
    #readme-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.65);
      z-index: 100;
      align-items: center;
      justify-content: center;
      padding: 32px;
    }

    #readme-overlay.open {
      display: flex;
    }

    #readme-modal {
      background: #1c1c26;
      border: 1px solid var(--border);
      border-radius: 14px;
      width: 100%;
      max-width: 700px;
      max-height: 80vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #readme-modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 22px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    #readme-modal-title {
      font-size: 0.8rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    #readme-close {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 1.1rem;
      line-height: 1;
      padding: 4px 6px;
      border-radius: 4px;
      transition: color 0.1s;
    }

    #readme-close:hover { color: var(--text); }

    #readme-body {
      overflow-y: auto;
      padding: 24px 26px;
      line-height: 1.75;
      font-size: 0.9rem;
    }

    /* Markdown content styles */
    #readme-body h1 { color: var(--accent); font-size: 1.3rem; margin: 0 0 0.8em; }
    #readme-body h2 { color: var(--accent); font-size: 1.05rem; border-bottom: 1px solid var(--border); padding-bottom: 0.3em; margin: 1.4em 0 0.5em; }
    #readme-body h3 { color: var(--text); font-size: 0.95rem; margin: 1.2em 0 0.4em; }
    #readme-body p  { color: #c0c0d4; margin: 0.5em 0; }
    #readme-body ul, #readme-body ol { color: #c0c0d4; padding-left: 1.5em; margin: 0.4em 0; }
    #readme-body li { margin: 0.2em 0; }
    #readme-body code { background: #23232f; padding: 2px 6px; border-radius: 4px; font-size: 0.83em; color: #c0c0d4; }
    #readme-body pre  { background: #12121a; border: 1px solid var(--border); border-radius: 8px; padding: 14px 16px; overflow-x: auto; margin: 0.8em 0; }
    #readme-body pre code { background: none; padding: 0; }
    #readme-body blockquote { border-left: 3px solid var(--accent); padding-left: 14px; color: var(--muted); margin: 0.8em 0; font-style: italic; }
    #readme-body hr  { border: none; border-top: 1px solid var(--border); margin: 1.5em 0; }
    #readme-body strong { color: var(--text); }
    #readme-body a { color: var(--accent); }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  </style>
</head>
<body>

<nav id="sidebar">
  <div class="sidebar-header">
    <h1>hevannie</h1>
    <p>GBDA302 Sidequests</p>
  </div>
  <ul class="sq-list" id="sq-list"></ul>
</nav>

<main id="main">
  <header id="main-header">
    <span id="sq-title">Pick a sidequest</span>
    <button id="readme-btn" style="display:none" onclick="openReadme()">See README</button>
  </header>
  <div id="canvas-area">
    <div id="landing">
      <h2>GBDA302 Sidequests</h2>
      <p>Select a sidequest from the sidebar to get started.</p>
    </div>
    <iframe id="sketch-frame" title="Sidequest sketch"></iframe>
  </div>
</main>

<div id="readme-overlay" onclick="handleOverlayClick(event)">
  <div id="readme-modal">
    <div id="readme-modal-header">
      <span id="readme-modal-title">README</span>
      <button id="readme-close" onclick="closeReadme()">&#x2715;</button>
    </div>
    <div id="readme-body"></div>
  </div>
</div>

<script>
  const TOTAL = 10;
  let currentSq = null;

  // Build sidebar buttons
  const list = document.getElementById('sq-list');
  for (let i = 1; i <= TOTAL; i++) {
    const num = String(i).padStart(2, '0');
    const li = document.createElement('li');
    li.innerHTML = `<button class="sq-btn" id="btn-${i}" onclick="loadSidequest(${i})">Sidequest ${num}</button>`;
    list.appendChild(li);
  }

  // Load from URL param on page open
  const params = new URLSearchParams(location.search);
  if (params.has('sq')) {
    const n = parseInt(params.get('sq'));
    if (n >= 1 && n <= TOTAL) loadSidequest(n);
  }

  function loadSidequest(n) {
    if (currentSq) document.getElementById(`btn-${currentSq}`)?.classList.remove('active');
    currentSq = n;
    const num = String(n).padStart(2, '0');

    document.getElementById(`btn-${n}`)?.classList.add('active');
    document.getElementById('sq-title').textContent = `Sidequest ${num}`;
    document.getElementById('readme-btn').style.display = '';
    document.getElementById('readme-modal-title').textContent = `Sidequest ${num} – README`;

    document.getElementById('landing').style.display = 'none';
    const frame = document.getElementById('sketch-frame');
    frame.style.display = 'block';
    frame.src = `sidequest-${num}/index.html`;

    history.replaceState(null, '', `?sq=${n}`);
  }

  async function openReadme() {
    if (!currentSq) return;
    const num = String(currentSq).padStart(2, '0');
    const body = document.getElementById('readme-body');
    body.innerHTML = '<p style="color:var(--muted)">Loading...</p>';
    document.getElementById('readme-overlay').classList.add('open');
    try {
      const res = await fetch(`sidequest-${num}/README.md`);
      if (!res.ok) throw new Error('not found');
      const text = await res.text();
      body.innerHTML = marked.parse(text);
    } catch {
      body.innerHTML = '<p style="color:var(--muted)">README not found for this sidequest.</p>';
    }
  }

  function closeReadme() {
    document.getElementById('readme-overlay').classList.remove('open');
  }

  function handleOverlayClick(e) {
    if (e.target === document.getElementById('readme-overlay')) closeReadme();
  }

  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeReadme(); });
</script>

</body>
</html>
